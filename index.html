<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/layout.css">
    <link rel="icon" href="images/icon.png" type="image/png">
    <script defer src="javascripts/scripts.js"></script>
</head>

<body>
    <div class="bg-image"></div>
    <div class="main tiny5-regular">
        <section class="section1">
            <div class="title">
                A.N.G.S.T
            </div>
            <div class="title-small">
                AFFECTIVE NOISE GENERATION STORAGE TERMINAL
            </div>
        </section>
    </div>
    <section class="section2">
        <div class="line-1"></div>
        <div class="line-2"></div>
        <div class="background">
            <div class="screen">
                <div class="frame"></div>
                <div class="nails"></div>
            </div>
            <div class="buttons">
                <div class="btn-ligh-on"></div>
                <div class="btn-ligh-off"></div>
                <div class="btn-blue"></div>
                <div class="btn-red"></div>
                <div class="btn-yellow"></div>
            </div>
        </div>
    </section>
    <section class="section3">
        <div class="background">
            <div class="player">
                <div class="cd-disk"></div>
                <div class="dynamics"></div>
                <div class="buttons-player">
                    <div class="btn-back"></div>
                    <div class="btn-play"></div>
                    <div class="btn-forward"></div>
                </div>
            </div>
        </div>

    </section>
    <section class="section4">
        <div class="player-2">
            <div class="wave">
                <div class="wave-line"></div>
                <div class="wave-ruler"></div>
            </div>
            <div class="buttons">
                <div class="btn-sound-on"></div>
                <div class="btn-sound-off"></div>
            </div>
        </div>
    </section>
    <section class="section5">

    </section>
    <section class="section6">

    </section>
    <section class="section7">

    </section>
    <section class="section8">

    </section>


</body>

</html>
