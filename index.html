<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/layout.css">
    <link rel="icon" href="images/icon.png" type="image/png">
    <script defer src="javascripts/scripts.js"></script>
</head>
<!-- section 1 - title--->

<body>
    <div class="main tiny5-regular">
        <section class="section1">
            <div class="title">
                A.N.G.S.T
            </div>
            <div class="title-small">
                AFFECTIVE NOISE GENERATION STORAGE TERMINAL
            </div>
        </section>
    </div>
    <div class="line-1"></div>
    <div class="line-2"></div>
    <!-- section 2 --->
    <section class="section2">
        <div class="section2-box">
            <img class="background-image-sec-2 hidden" src="/images/section2/backgroundsec2.png">

            <div class="screen">
                <div id="screen-cctv" class="screen-cctv-base screen-cctv-image-1"></div>
                <div class="nails hidden"><img src="/images/section2/nail.png">
                </div>
            </div>
            <div class="buttons">
                <div class="lamp-icons">
                    <button><img src="/images/section2/lampIconOn.svg" class="btn"></button>
                    <button><img src="/images/section2/lampIconOff.svg" class="btn"></button>
                </div>
                <div class="group-buttons-sec2"><button><img src="/images/section2/blueButtonOff.svg"
                            class="btn"></button>
                    <button><img src="/images/section2/redButtonOff.svg" class="btn"></button>
                    <button><img src="/images/section2/yellowButtonOff.svg" class="btn"></button>
                </div>
            </div>
        </div>
    </section>
    <!-- section 3 --->
    <section class="section3">
        <div class="background-sec-3">
            <div class="player">

                <div class="buttons-and-dyn">
                    <div class="dynamic-1"></div>
                    <div class="dynamic-2"></div>
                    <div class="dynamic-3"></div>
                    <div class="buttons-player">
                        <button class="btn-back"><img src="/images/section3/backButton.svg"></button>
                        <button class="btn-play"><img src="/images/section3/playButton.svg"></button>
                        <button class="btn-forward"><img src="/images/section3/forwardButton.svg"></button>
                    </div>
                </div>
                <div class="disk-block">
                    <div class="cd-disk"></div>
                </div>
            </div>
        </div>
    </section>
    <!-- section 4 --->
    <section class="section4">
        <div class="background-sec-4">
            <div class="wave">
                <div class="wave-line">
                    <div class="wave-track">
                        <img class="spectrogram-img" src="/images/section4/spectrogramGreen.svg">
                        <img class="spectrogram-img" src="/images/section4/spectrogramGreen.svg">
                    </div>
                </div>
                <div class="wave-ruler">
                    <div id="sliderTrack" class="slider-track">
                        <div id="sliderButton" class="slider-button">
                            <img src="/images/section4/slider.svg">
                        </div>
                    </div>
                </div>
            </div>
            <div class="buttons-section-4">
                <div class="btn-sound-on"><img src="/images/section4/SoundOn.svg"></div>
                <div class="btn-sound-off"><img src="/images/section4/soundOff.svg"></div>
            </div>
        </div>
    </section>
    <!-- <section class="section5">
        <div class="background-sec-5">
            <div class="screen-1">
                <div class="screen-buttons"></div>
                <div class="id-image"></div>
            </div>
            <div class="screen-and-buttons">
                <div class="screen-2"></div>
                <div class="group-buttons"></div>
            </div>
            <div class="progress-bar"></div>
        </div>
    </section>
    <section class="section6">
        <div class="puzzle"></div>
        <div class="yellow-tape"></div>
    </section>
    <section class="section7">
        <div class="puzzle-grid"></div>
        <div class="yellow-tapes"></div>
        <div class="footer"></div>
        <div class="character-animation"></div>
    </section> -->
</body>

</html>
