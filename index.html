<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stylesheets/style.css">
    <link rel="stylesheet" href="stylesheets/layout.css">
    <link rel="stylesheet" href="stylesheets/section2.css">
    <link rel="stylesheet" href="stylesheets/section5.css">
    <link rel="stylesheet" href="stylesheets/section6.css">

    <link rel="icon" href="images/icon.png" type="image/png">
    <script defer src="javascripts/scripts.js"></script>
</head>
<!-- section 1 - title--->

<body>
    <div class="main tiny5-regular">
        <section class="section1">
            <div class="title">
                A.N.G.S.T
            </div>
            <div class="title-small">
                AFFECTIVE NOISE GENERATION STORAGE TERMINAL
            </div>
        </section>
    </div>
    <div class="line-1"></div>
    <div class="line-2"></div>
    <!-- section 2 --->
    <section class="section2">
        <div class="section2-box">
            <img class="section2-background-image" src="/images/section2/backgroundsec2.png">
            <div class="section2-box-internal">
                <div class="section2-screen">
                    <div id="section2-screen-cctv" class="section2-screen-cctv-base section2-screen-cctv-image-1"></div>
                    <div class="section2-nails hidden"><img src="/images/section2/nail.png">
                    </div>
                </div>
                <div class="section2-buttons">
                    <div class="section2-lamp-icons">
                        <div><img src="/images/section2/lampIconOn.svg" class="btn"></div>
                        <div><img src="/images/section2/lampIconOff.svg" class="btn"></div>
                    </div>
                    <div class="section2-group-buttons">
                        <div><img src="/images/section2/blueButtonOff.svg" class="btn"></div>
                        <div><img src="/images/section2/redButtonOff.svg" class="btn"></div>
                        <div><img src="/images/section2/yellowButtonOff.svg" class="btn"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- section 3 --->
    <section class="section3">
        <div class="background-sec-3">
            <div class="player">
                <div class="section3-buttons">
                    <div class="dynamics">
                        <div class="dynamic-1"></div>
                        <div class="dynamic-2"></div>
                        <div class="dynamic-3"></div>
                    </div>
                    <div class="buttons-player">
                        <div class="btn-back"><img src="/images/section3/backButton.svg"></div>
                        <div class="btn-play"><img src="/images/section3/playButton.svg"></div>
                        <div class="btn-forward"><img src="/images/section3/forwardButton.svg"></div>
                    </div>
                </div>
                <div class="disk-block">
                    <div class="cd-disk"></div>
                </div>
            </div>
        </div>
    </section>
    <!-- section 4 --->
    <section class="section4">
        <div class="background-sec-4">
            <div class="wave">
                <div class="wave-line">
                    <div class="wave-track">
                        <img class="spectrogram-img" src="/images/section4/spectrogramGreen.svg">
                        <img class="spectrogram-img" src="/images/section4/spectrogramGreen.svg">
                    </div>
                </div>
                <div class="wave-ruler">
                    <div id="sliderTrack" class="slider-track">
                        <div id="sliderButton" class="slider-button">
                            <img src="/images/section4/slider.svg">
                        </div>
                    </div>
                </div>
            </div>
            <div class="buttons-section-4">
                <div class="btn-sound-on"><img src="/images/section4/SoundOn.svg"></div>
                <div class="btn-sound-off"><img src="/images/section4/soundOff.svg"></div>
            </div>
        </div>
    </section>

    <section class="section5">
        <div class="section5-box">
            <img class="section5-background-image" src="/images/section5/backgroundsec5.png">
            <div class="section5-box-internal">
                <div class="section5-screen-1">
                    <div class="section5-id-block">
                    </div>
                    <div class="section5-nails hidden"><img src="/images/section5/nail.png">
                    </div>
                </div>
                <div class="section5-screen-2">

                    <div class="section5-nails hidden"><img src="/images/section5/nail.png"></div>
                </div>
            </div>
            <div class="section5-progress-bar">
                <div class="section5-progress-bar-decor"><img src="/images/section5/progressBar.png"></div>
            </div>
        </div>
    </section>


    <section class="section6">
        <div class="section6-puzzle">
            <img src="images/section6/puzzlepart1.png" alt="puzzle1" class="puzzle puzzle1" draggable="true"
                loading="lazy" />
            <img src="images/section6/puzzlepart2.png" alt="puzzle2" class="puzzle puzzle2" draggable="true"
                loading="lazy" />
            <img src="images/section6/puzzlepart3.png" alt="puzzle3" class="puzzle puzzle3" draggable="true"
                loading="lazy" />
            <img src="images/section6/puzzlepart4.png" alt="puzzle4" class="puzzle puzzle4" draggable="true"
                loading="lazy" />
            <img src="images/section6/puzzlepart5.png" alt="puzzle5" class="puzzle puzzle5" draggable="true"
                loading="lazy" />
            <img src="images/section6/puzzlepart6.png" alt="puzzle6" class="puzzle puzzle6" draggable="true"
                loading="lazy" />

            <div class="puzzle-drop">
                <div class="drop1"></div>
                <div class="drop2"></div>
                <div class="drop3"></div>
                <div class="drop4"></div>
                <div class="drop5"></div>
                <div class="drop6"></div>
            </div>
            <img class="puzzle-frame" src="images/section6/puzzleFrame.png">
        </div>   
    <div class="section-6-green-grid"><img src="images/section6/grid.png"></div>
    </section>

    <section class="section7">
        <div class="section7-footer">
            <div class="section7-bottom-text">
                    <div>Мироничева Мария</div>
                    <div>Б25ДЗ09</div>
                    <div>Кураторы: Комкова Анна, Зародина Дарья</div>
            </div>
        </div>
        <div class="section7-character-animation"></div>

</body>

</html>
